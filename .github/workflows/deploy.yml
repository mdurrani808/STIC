name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-emacs-texlive-${{ hashFiles('.github/workflows/deploy.yml') }}

      - name: Install Emacs, TeXLive, and Perl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            emacs-nox \
            texlive-xetex \
            texlive-latex-extra \
            texlive-latex-recommended \
            texlive-fonts-recommended \
            texlive-extra-utils \
            cpanminus \
            poppler-utils \
            ffmpeg

      - name: Cache CPAN modules
        uses: actions/cache@v4
        with:
          path: ~/.cpanm
          key: cpanm-BeamerReveal-${{ runner.os }}

      - name: Install BeamerReveal
        run: |
          sudo cpanm --notest BeamerReveal
          sudo mkdir -p /usr/local/share/texmf/tex/latex/beamer-reveal
          sudo cp scripts/beamer-reveal.sty /usr/local/share/texmf/tex/latex/beamer-reveal/
          sudo texhash /usr/local/share/texmf

      - name: Build slides
        run: bash scripts/build-slides.sh

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
